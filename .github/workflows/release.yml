name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fulmenhq/goneat-tools-runner-glibc:v0.3.1
      # Use UID 1001 to match GitHub-hosted runner workspace ownership.
      options: --user 1001
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Verify toolchain
        shell: bash
        run: |
          set -euo pipefail
          yamlfmt --version
          yamllint --version
          prettier --version
          jq --version
          yq --version
          rg --version

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify VERSION file matches tag
        run: |
          file_version=$(cat VERSION)
          tag_version="${{ steps.version.outputs.version }}"
          if [ "$file_version" != "$tag_version" ]; then
            echo "VERSION file ($file_version) does not match tag ($tag_version)"
            exit 1
          fi
          echo "VERSION file matches tag: $tag_version"

      - name: Verify release notes exist
        run: |
          version="${{ steps.version.outputs.version }}"
          if [ ! -f "docs/releases/v${version}.md" ]; then
            echo "Missing release notes: docs/releases/v${version}.md"
            exit 1
          fi
          echo "Release notes found: docs/releases/v${version}.md"

      - name: Verify CHANGELOG entry exists
        run: |
          version="${{ steps.version.outputs.version }}"
          if ! grep -q "## \[${version}\]" CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version ${version}"
            exit 1
          fi
          echo "CHANGELOG entry found for ${version}"

      - name: Run quality checks
        shell: bash
        run: |
          set -euo pipefail
          make check

      - name: Verify no uncommitted changes
        shell: bash
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git diff --exit-code || (echo "Unexpected changes detected" && exit 1)

  verify-signature:
    # The signed tag is the publication authorization (PDR-0004). This job
    # asserts the signature before anything is published; failure here means no
    # release object is created at all.
    #
    # Two assertions, both required:
    #   1. The tag is signed by the PINNED release key committed at
    #      docs/security/release-signing-keys.asc — verified in an isolated
    #      keyring built only from that file. GitHub's verified flag alone
    #      accepts any key on the tagger's account; the pin is what makes the
    #      signature an authorization rather than an attribution.
    #   2. GitHub independently reports the tag verified (key registered to a
    #      maintainer account with a matching verified email).
    #
    # Runs outside the tools-runner container: the assertion needs the GitHub
    # CLI, which that image does not carry.
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      tag_object_sha: ${{ steps.verify_tag.outputs.tag_object_sha }}
    steps:
      - name: Checkout (pinned release keys + tag object)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Verify version-tag publication policy
        env:
          GH_TOKEN: ${{ github.token }}
        # GitHub redacts bypass_actors from read-only API callers. The signed
        # tag carries the full-policy attestation produced before tag creation;
        # this step independently checks every field visible at publication.
        run: ./scripts/release-guard-tag-ruleset.sh --read-only
      - name: Verify tag is signed by the pinned release key
        id: verify_tag
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          gpg --batch --import docs/security/release-signing-keys.asc
          tag_ref=$(gh api "repos/${REPO}/git/ref/tags/${TAG}")
          tag_type=$(jq -r '.object.type // empty' <<<"${tag_ref}")
          tag_object_sha=$(jq -r '.object.sha // empty' <<<"${tag_ref}")
          if [ "${tag_type}" != "tag" ] || ! [[ "${tag_object_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Tag ${TAG} is not an annotated tag with a valid object SHA"
            exit 1
          fi
          # Ensure the annotated tag object is present locally. A lightweight
          # tag has no object to verify and fails here — intended.
          git fetch --no-tags --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          local_tag_object_sha=$(git rev-parse "refs/tags/${TAG}^{tag}")
          if [ "${local_tag_object_sha}" != "${tag_object_sha}" ]; then
            echo "Tag ${TAG} changed while its authorization was being verified"
            exit 1
          fi
          # Exits nonzero unless the signature verifies against a key in the
          # isolated keyring, i.e. the committed pin file. VALIDSIG asserts a
          # full-fingerprint match rather than a short-id collision.
          #
          # Both greps are required, and neither is redundant:
          #   VALIDSIG - present for any cryptographically valid signature.
          #   GOODSIG  - replaced by EXPKEYSIG once the signing key expires,
          #              while VALIDSIG is still emitted. Checking VALIDSIG
          #              alone would therefore accept an expired pinned key.
          # git verify-tag itself also exits nonzero on an expired key (unlike
          # a bare gpg --verify, which exits 0), so under `set -o pipefail` the
          # step already fails. The GOODSIG assertion is stated explicitly so
          # this step stands on its own rather than on that interaction.
          git verify-tag --raw "${tag_object_sha}" 2>&1 | tee /tmp/verify-tag.out
          grep -q "^\[GNUPG:\] GOODSIG " /tmp/verify-tag.out
          grep -q "^\[GNUPG:\] VALIDSIG " /tmp/verify-tag.out
          ./scripts/release-guard-tag-ruleset.sh --verify-tag-attestation "${tag_object_sha}"
          echo "tag_object_sha=${tag_object_sha}" >> "${GITHUB_OUTPUT}"
          echo "Tag ${TAG} object ${tag_object_sha} signed by pinned, unexpired release key"
      - name: Verify GitHub reports the tag verified
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          TAG_OBJECT_SHA: ${{ steps.verify_tag.outputs.tag_object_sha }}
        run: |
          set -euo pipefail
          if ! [[ "${TAG_OBJECT_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Verified tag object SHA is missing or malformed"
            exit 1
          fi
          verified=$(gh api "repos/${REPO}/git/tags/${TAG_OBJECT_SHA}" --jq .verification.verified)
          if [ "$verified" != "true" ]; then
            echo "Tag ${TAG} is not a verified signed tag (verification.verified=${verified})"
            echo "Publication is not authorized. No release will be created."
            exit 1
          fi
          echo "Tag ${TAG} signature verified; publication authorized"

  create-release:
    needs: [verify, verify-signature]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check if prerelease
        id: prerelease
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          if [[ "$version" == *alpha* ]] || [[ "$version" == *beta* ]] || [[ "$version" == *rc* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reassert verified tag object before publication
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          EXPECTED_TAG_OBJECT_SHA: ${{ needs.verify-signature.outputs.tag_object_sha }}
        run: |
          set -euo pipefail
          if ! [[ "${EXPECTED_TAG_OBJECT_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Verified tag object SHA is missing or malformed"
            exit 1
          fi
          tag_ref=$(gh api "repos/${REPO}/git/ref/tags/${TAG}")
          current_tag_type=$(jq -r '.object.type // empty' <<<"${tag_ref}")
          current_tag_object_sha=$(jq -r '.object.sha // empty' <<<"${tag_ref}")
          if [ "${current_tag_type}" != "tag" ] || [ "${current_tag_object_sha}" != "${EXPECTED_TAG_OBJECT_SHA}" ]; then
            echo "Tag ${TAG} no longer resolves to the verified annotated tag object"
            exit 1
          fi
          echo "Tag ${TAG} still resolves to verified object ${EXPECTED_TAG_OBJECT_SHA}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version }}"
          body_path: "docs/releases/v${{ steps.version.outputs.version }}.md"
          # Posture: the signed tag authorizes publication; CI verifies and
          # publishes (PDR-0004). A draft release is a failure state, not a step.
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          # Set explicitly: a prior release does not yield the flag on its own,
          # and a prerelease must never take it.
          make_latest: ${{ steps.prerelease.outputs.is_prerelease == 'false' }}

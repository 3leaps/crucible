name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fulmenhq/goneat-tools-runner-glibc:v0.3.1
      # Use UID 1001 to match GitHub-hosted runner workspace ownership.
      options: --user 1001
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Verify toolchain
        shell: bash
        run: |
          set -euo pipefail
          yamlfmt --version
          yamllint --version
          prettier --version
          jq --version
          yq --version
          rg --version

      - name: Run quality checks
        shell: bash
        run: |
          set -euo pipefail
          make check

      - name: Verify formatting (no changes)
        shell: bash
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git diff --exit-code || (echo "Formatting changed files. Run 'make fmt' and commit." && exit 1)
